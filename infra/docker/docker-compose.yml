version: '3.8'

services:
  db:
    image: timescale/timescaledb-ha:pg15
    container_name: aviation_db
    environment:
      - POSTGRES_PASSWORD=aviation_hunter
      - POSTGRES_DB=opensky_hunter
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
